<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계좌 거래 내역</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background:#f5f6f8;
    padding:20px 16px;
    color:#222;
}

.container{
    width:100%;
    max-width:420px;
    margin:0 auto;
}

/* 제목 */

h2{
    font-size:22px;
    font-weight:700;
    margin-bottom:20px;
    line-height:1.4;
}

/* 버튼 */

button{
    width:100%;
    min-height:48px;
    border:none;
    border-radius:12px;
    background:#0064ff;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-bottom:20px;
    -webkit-appearance:none;
    appearance:none;
}

button:hover{
    background:#0052d6;
}

/* 거래 리스트 */

#list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* 거래 카드 */

.transaction{
    background:white;
    border-radius:16px;
    padding:16px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* 거래 정보 */

.transaction .info{
    flex:1;
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:4px;
}

.transaction .info .name{
    font-size:15px;
    font-weight:600;
    line-height:1.4;
    word-break:keep-all;
    overflow-wrap:break-word;
}

.transaction .info .date{
    font-size:13px;
    color:#888;
    line-height:1.4;
}

/* 금액 */

.transaction .amount{
    flex-shrink:0;
    text-align:right;
    font-weight:700;
    font-size:15px;
    line-height:1.4;
    white-space:nowrap;
}

.deposit{
    color:#0064ff;
}

.withdraw{
    color:#e53935;
}

/* 모바일 최적화 */

@media (max-width:480px){

    body{
        padding:16px 12px;
    }

    .container{
        max-width:100%;
    }

    h2{
        font-size:20px;
        margin-bottom:16px;
    }

    button{
        min-height:46px;
        font-size:15px;
        margin-bottom:16px;
    }

    .transaction{
        padding:14px 12px;
        border-radius:14px;
        gap:10px;
    }

    .transaction .info .name{
        font-size:14px;
    }

    .transaction .info .date{
        font-size:12px;
    }

    .transaction .amount{
        font-size:14px;
    }
}

</style>
</head>

<body>

<div class="container">

<h2>계좌 거래 내역</h2>

<button onclick="loadData()">거래내역 조회</button>

<div id="list"></div>

</div>

<script>

async function loadData(){ // 서버에서 거래 데이터를 가져와 화면에 출력하는 함수 (async : 비동기 처리)

    const response = await fetch("/api/account"); // account api 요청을 보내고 응답 객체 받기
    const data = await response.json(); // 응답 받은 json 데이터를 js객체로 받아서 data 변수에 할당

    const list = document.getElementById("list");

    list.innerHTML = "";

    data.forEach(tx => { // 받은 데이터 배열을 반복문으로 돌리기

        const div = document.createElement("div");
        div.className = "transaction";

        div.innerHTML = `
        <div class="info">
            <div class="name">${tx.name}</div>
            <div class="date">${tx.date}</div>
        </div>

        <div class="amount ${tx.type}">
            ${tx.amount.toLocaleString()} 원
        </div>
        `;

        list.appendChild(div);

    });

}

</script>

</body>
</html>
