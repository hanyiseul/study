<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>라우팅 페이지</title>
</head>
<body>
    <h1>페이지 이동 중...</h1>
    <div id="msg">권한 확인 중입니다.</div>

    <script>
        async function init() {
            const token = localStorage.getItem('myToken');

            if (!token) {
                location.href = '/';
                return;
            }

            const res = await fetch('/api/verify', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            const data = await res.json();

            if (!data.success) {
                localStorage.removeItem('myToken');
                location.href = '/';
                return;
            }

            if (data.user.role === 'admin') {
                location.href = '/admin';
            } else {
                location.href = '/user';
            }
        }

        init();
    </script>
</body>
</html>
