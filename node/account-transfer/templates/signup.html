<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <h1>회원가입</h1>
  <input type="text" id="uId" placeholder="아이디"><br>
  <input type="password" id="uPw" placeholder="비밀번호"><br>
  <input type="text" id="uName" placeholder="이름"><br>

  <select id="uRole">
      <option value="user">사용자</option>
      <option value="admin">관리자</option>
  </select><br><br>

  <button onclick="save()">가입하기</button>

  <script>
      async function save() {
          const res = await fetch('/api/signup', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({
                  userId: uId.value,
                  password: uPw.value,
                  userName: uName.value,
                  role: uRole.value
              })
          });

          const data = await res.json();

          if (data.success) {
              alert('가입 완료\n생성된 계좌번호: ' + data.accountNumber);
              location.href = '/';
          } else {
              alert(data.message || '가입 실패');
          }
      }
  </script>
</body>
</html>
