<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>충정일보</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1 class="logo">충정일보</h1>
  </header>
  <nav>
    <ul class="gnb_list"></ul>
  </nav>
  <main style="display: block;">
    <section class="signupBox">
      <h1>회원가입</h1>
      <form id="userForm">
        <div class="inputWrap">
          <label for="uId">권한</label>
          <select name="" id="Authorization">
            <option value="ADMIN">관리자</option>
            <option value="REPORTER">기자</option>
            <option value="USER">사용자</option>
          </select>
        </div>
        <div class="inputWrap">
          <label for="uId">아이디</label>
          <input type="text" id="uId" placeholder="아이디">
        </div>
        <div class="inputWrap">
          <label for="uPw">비밀번호</label>
          <input type="password" id="uPw" placeholder="비밀번호">
        </div>
        <div class="inputWrap">
          <label for="uName">이름</label>
          <input type="text" id="uName" placeholder="이름">
        </div>
        <button type="button" class="button" onclick="save()">가입하기</button>
      </form>
    </section>
  </main>
  <script>
      async function save() {
        const role = document.getElementById("Authorization").value;
        await fetch('/api/signup', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({Authorization: role, userId: uId.value, password: uPw.value, userName: uName.value, })
        });
        alert('가입 완료'); location.href = '/login';
      }
  </script>
</body>
</html>
