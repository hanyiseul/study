<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>고객 화면</title>
</head>
<body>
    <h1>고객 화면</h1>

    <div id="welcome"></div>
    <div id="roleInfo"></div>
    <br>

    <button onclick="loadData()">새로고침</button>
    <button onclick="logout()">로그아웃</button>

    <hr>

    <h2>내 계좌 목록</h2>
    <ul id="accountList"></ul>

    <h2>현재 이체 한도</h2>
    <ul id="transferLimitInfo"></ul>

    <hr>

    <h2>계좌이체</h2>
    <div>출금 계좌번호</div>
    <input type="text" id="fromAccountNumber">
    <br><br>

    <div>받는 계좌번호</div>
    <input type="text" id="toAccountNumber">
    <br><br>

    <div>이체 금액</div>
    <input type="number" id="amount">
    <br><br>

    <div>메모</div>
    <input type="text" id="memo">
    <br><br>

    <button onclick="sendTransfer()">이체하기</button>

    <hr>

    <h2>예금·적금 상품 목록</h2>
    <ul id="productList"></ul>

    <h2>예금·적금 가입</h2>
    <div>출금 계좌번호</div>
    <input type="text" id="savingsAccountNumber">
    <br><br>

    <div>상품 ID</div>
    <input type="number" id="savingsProductId">
    <br><br>

    <div>예금 가입금액</div>
    <input type="number" id="savingsJoinAmount">
    <br><br>

    <div>적금 월납입금</div>
    <input type="number" id="savingsMonthlyAmount">
    <br><br>

    <button onclick="joinSavings()">가입하기</button>

    <hr>

    <h2>내 가입 상품</h2>
    <ul id="mySavingsList"></ul>

    <hr>

    <h2>거래 내역</h2>
    <table border="1" cellpadding="6">
        <thead>
            <tr>
                <th>일시</th>
                <th>구분</th>
                <th>금액</th>
                <th>상대계좌</th>
                <th>잔액</th>
                <th>메모</th>
            </tr>
        </thead>
        <tbody id="transactionTable"></tbody>
    </table>

    <script>
        function logout() {
            localStorage.removeItem('myToken');
            location.href = '/';
        }

        function typeToKorean(type) {
            if (type === 'DEPOSIT') return '입금';
            if (type === 'WITHDRAW') return '출금';
            if (type === 'TRANSFER_OUT') return '이체출금';
            if (type === 'TRANSFER_IN') return '이체입금';
            return type;
        }

        function productTypeToKorean(type) {
            if (type === 'DEPOSIT') return '정기예금';
            if (type === 'INSTALLMENT') return '적금';
            return type;
        }

        function formatNumber(value) {
            return Number(value).toLocaleString('ko-KR');
        }

        async function loadData() {
            const token = localStorage.getItem('myToken');
            if (!token) {
                location.href = '/';
                return;
            }

            const res = await fetch('/api/data', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            const data = await res.json();

            if (!data.success) {
                alert(data.message || '조회 실패');
                logout();
                return;
            }

            if (data.role !== 'user') {
                location.href = '/main';
                return;
            }

            document.getElementById('welcome').innerText = data.user.userName + '님 반갑습니다.';
            document.getElementById('roleInfo').innerText = '권한: ' + data.role;

            const accountList = document.getElementById('accountList');
            const transferLimitInfo = document.getElementById('transferLimitInfo');
            const transactionTable = document.getElementById('transactionTable');
            const productList = document.getElementById('productList');
            const mySavingsList = document.getElementById('mySavingsList');

            accountList.innerHTML = '';
            transferLimitInfo.innerHTML = '';
            transactionTable.innerHTML = '';
            productList.innerHTML = '';
            mySavingsList.innerHTML = '';

            data.accounts.forEach(item => {
                const li = document.createElement('li');
                li.innerText = `계좌번호: ${item.account_number} / 잔액: ${formatNumber(item.balance)}원`;
                accountList.appendChild(li);
            });

            if (data.accounts.length > 0) {
                document.getElementById('fromAccountNumber').value = data.accounts[0].account_number;
                document.getElementById('savingsAccountNumber').value = data.accounts[0].account_number;
            }

            if (data.transferLimit) {
                const li1 = document.createElement('li');
                li1.innerText = `1일 한도: ${formatNumber(data.transferLimit.daily_limit)}원`;
                transferLimitInfo.appendChild(li1);

                const li2 = document.createElement('li');
                li2.innerText = `1회 한도: ${formatNumber(data.transferLimit.per_transfer_limit)}원`;
                transferLimitInfo.appendChild(li2);

                const li3 = document.createElement('li');
                li3.innerText = `금일 사용액: ${formatNumber(data.transferLimit.used_today)}원`;
                transferLimitInfo.appendChild(li3);
            }

            data.transactions.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${new Date(item.created_at).toLocaleString('ko-KR')}</td>
                    <td>${typeToKorean(item.tx_type)}</td>
                    <td>${formatNumber(item.amount)}원</td>
                    <td>${item.related_account || '-'}</td>
                    <td>${formatNumber(item.balance_after)}원</td>
                    <td>${item.memo || ''}</td>
                `;
                transactionTable.appendChild(tr);
            });

            data.products.forEach(item => {
                const li = document.createElement('li');
                li.innerText = `상품ID: ${item.product_id} / 상품명: ${item.product_name} / 유형: ${productTypeToKorean(item.product_type)} / 금리: ${item.interest_rate}% / 기간: ${item.period_months}개월 / 최소금액: ${formatNumber(item.min_amount)}원`;
                productList.appendChild(li);
            });

            data.mySavings.forEach(item => {
                const li = document.createElement('li');
                li.innerText = `상품명: ${item.product_name} / 유형: ${productTypeToKorean(item.product_type)} / 예금금액: ${formatNumber(item.join_amount)}원 / 월납입금: ${formatNumber(item.monthly_amount)}원 / 만기일: ${item.maturity_date} / 상태: ${item.status}`;
                mySavingsList.appendChild(li);
            });
        }

        async function sendTransfer() {
            const token = localStorage.getItem('myToken');

            const res = await fetch('/api/transfer', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    fromAccountNumber: document.getElementById('fromAccountNumber').value,
                    toAccountNumber: document.getElementById('toAccountNumber').value,
                    amount: document.getElementById('amount').value,
                    memo: document.getElementById('memo').value
                })
            });

            const data = await res.json();

            if (data.success) {
                alert('이체 완료');
                document.getElementById('toAccountNumber').value = '';
                document.getElementById('amount').value = '';
                document.getElementById('memo').value = '';
                loadData();
            } else {
                alert(data.message || '이체 실패');
            }
        }

        async function joinSavings() {
            const token = localStorage.getItem('myToken');

            const res = await fetch('/api/savings/join', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    accountNumber: document.getElementById('savingsAccountNumber').value,
                    productId: document.getElementById('savingsProductId').value,
                    joinAmount: document.getElementById('savingsJoinAmount').value,
                    monthlyAmount: document.getElementById('savingsMonthlyAmount').value
                })
            });

            const data = await res.json();

            if (data.success) {
                alert('상품 가입 완료');
                document.getElementById('savingsProductId').value = '';
                document.getElementById('savingsJoinAmount').value = '';
                document.getElementById('savingsMonthlyAmount').value = '';
                loadData();
            } else {
                alert(data.message || '상품 가입 실패');
            }
        }

        loadData();
    </script>
</body>
</html>
